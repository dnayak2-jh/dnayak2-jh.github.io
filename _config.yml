# Site settings
title: Dibyajyoti Nayak
first_name: Dibyajyoti
middle_name:
last_name: Nayak
email: dnayak2@jh.edu
description: >
  Ph.D. candidate at Johns Hopkins University working on Scientific Machine Learning and AI for Science.
footer_text:
keywords: scientific-machine-learning, neural-operators, deeponet, physics-informed-neural-networks, sciml

url: https://dnayak2-jh.github.io
baseurl:
last_updated: true

lang: en
timezone: America/New_York

academicons: true

# Layout
navbar_fixed: true
footer_fixed: false
search_enabled: true
socials_in_search: true

# Social
github_username: dnayak2-jh
linkedin_username: dibyajyoti-nayak
scholar_userid: YOUR_GOOGLE_SCHOLAR_ID
orcid_id:

# Analytics
google_analytics:
cronitor_analytics:

# Blog
blog_enabled: false

# Collections
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news:
  enabled: true
  scrollable: true
  limit: 5

latest_posts:
  enabled: false

# Jekyll settings
markdown: kramdown
highlighter: rouge

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# Jekyll Scholar
scholar:
  last_name: [Nayak]
  first_name: [Dibyajyoti, D.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  group_by: year
  group_order: descending
